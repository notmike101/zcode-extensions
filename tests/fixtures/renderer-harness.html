<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZCode Desktop Extensions renderer harness</title>
  <style>
    body { margin: 0; min-height: 100vh; color: #e6e9ef; background: #101217; font: 14px Inter, system-ui, sans-serif; }
    aside { box-sizing: border-box; width: 220px; min-height: 100vh; padding: 24px 12px; border-right: 1px solid #30343d; background: #17191f; }
    aside button { display: flex; width: 100%; align-items: center; gap: 10px; margin: 2px 0; padding: 10px; border: 0; border-radius: 7px; color: #c6cad2; background: transparent; text-align: left; }
    aside button:hover { background: #272b34; }
  </style>
</head>
<body>
  <div id="root"><aside><button type="button">Home</button><button type="button">Skills</button></aside></div>
  <script>
    const catalogOnly = new URLSearchParams(location.search).get("scenario") === "catalog";
    const schedulerManifest = {
      apiVersion: 1,
      id: "scheduler",
      name: "Scheduler",
      version: "0.1.2",
      description: "Create normal ZCode tasks from timezone-aware cron schedules while ZCode is open.",
      entrypoints: {main: "dist/main.cjs", renderer: "dist/renderer.js"},
      engines: {host: ">=0.2.0 <1", zcode: ">=3.3.6"},
      pages: [{id: "jobs", title: "Scheduler"}],
    };
    let installed = !catalogOnly;
    let queued = false;
    const currentState = () => ({
      name: "ZCode Desktop Extensions",
      version: "0.3.0",
      zcodeVersion: "3.3.6",
      root: "D:\\zcode-extensions",
      dataDir: "D:\\zcode-extensions\\data",
      plugins: installed ? [{
        manifest: schedulerManifest,
        enabled: true,
        loaded: true,
        generation: 1,
        update: queued
          ? {state: "queued", currentVersion: "0.1.2", latestVersion: "0.1.3", queuedVersion: "0.1.3"}
          : {state: "available", currentVersion: "0.1.2", latestVersion: "0.1.3", releaseUrl: "https://example.com"},
      }] : [],
      catalog: [{
        id: "scheduler",
        name: "Scheduler",
        description: "Create normal ZCode tasks from timezone-aware cron schedules while ZCode is open.",
        repositoryUrl: "https://github.com/notmike101/zcode-scheduler",
        installed,
        ...(installed ? {currentVersion: queued ? "0.1.2" : "0.1.2", state: "installed"} : {latestVersion: "0.1.3", state: "available"}),
      }],
      health: {protocol: "ready"},
    });
    window.confirm = () => true;
    window.zcodeDesktopPlugins = {
      async invoke(method) {
        if (method === "host:getState") return currentState();
        if (method === "host:getLogs") return [JSON.stringify({level: "info", message: "Harness ready"})];
        if (method === "extension:queueUpdate") queued = true;
        if (method === "extension:cancelUpdate") queued = false;
        if (method === "catalog:install") installed = true;
        return currentState();
      },
      on() { return () => undefined; },
    };
  </script>
  <script src="/renderer/index.js"></script>
</body>
</html>
