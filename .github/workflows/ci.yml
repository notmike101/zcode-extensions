name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Windows build
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Reject tracked generated or private files
        shell: pwsh
        run: |
          $tracked = @(git ls-files -- '*.exe' 'bin/**' 'runtime/**' 'data/**')
          if ($tracked.Count -gt 0) {
            $tracked | ForEach-Object { Write-Error "Generated or private path is tracked: $_" }
            exit 1
          }

      - name: Verify release metadata
        run: bun scripts/package-release.ts --verify-only

      - name: Typecheck, test, and build
        run: bun run check
